# ──────────────────────────────────────────────────────────────
# General
# ──────────────────────────────────────────────────────────────

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Refresh 'status-left' and 'status-right' more often (every 5s)
set -g status-interval 5

# Keep plenty of history for scrollback
set -g history-limit 50000

# Useful when using "grouped sessions" and multi-monitor setups
setw -g aggressive-resize on

# Increase tmux messages display duration (750ms -> 4s)
set -g display-time 4000
set -g display-panes-time 350

# Reload config
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# ──────────────────────────────────────────────────────────────
# Prefix
# ──────────────────────────────────────────────────────────────

# Change prefix from Ctrl-b to Ctrl-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ──────────────────────────────────────────────────────────────
# Navigation
# ──────────────────────────────────────────────────────────────

# Use Alt+arrow keys to switch panes (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ──────────────────────────────────────────────────────────────
# Splits & Windows
# ──────────────────────────────────────────────────────────────

# Intuitive split keys: v = vertical, h = horizontal
unbind '"'
unbind %
bind v split-window -h
bind h split-window -v

# Window numbering starts at 1 and stays contiguous
set -g base-index 1
set -g renumber-windows on

# Pane borders
set -g pane-border-lines "double"

# ──────────────────────────────────────────────────────────────
# Mouse & Copy
# ──────────────────────────────────────────────────────────────

# Enable mouse (scroll, resize, click)
set -g mouse on

# Scroll one line at a time in copy mode
bind -T copy-mode-vi WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode-vi WheelDownPane send -N1 -X scroll-down
bind -T copy-mode    WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode    WheelDownPane send -N1 -X scroll-down

# ──────────────────────────────────────────────────────────────
# Alerts
# ──────────────────────────────────────────────────────────────

set -g allow-passthrough on
set-option -g monitor-bell on
set-option -g bell-action any
set-option -g visual-bell off
set-hook -g alert-bell 'run-shell "paplay /home/administrator/tmux-alert.wav"'

# ──────────────────────────────────────────────────────────────
# Extended Keys (Shift+Enter support)
# ──────────────────────────────────────────────────────────────

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# Explicitly bind Shift+Enter to send the CSI u sequence
bind-key -n S-Enter send-keys Escape "[13;2u"

# ──────────────────────────────────────────────────────────────
# Plugins (managed by tpm)
# ──────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'          # https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tmux-yank'    # https://github.com/tmux-plugins/tmux-yank

# tmux-yank: copy to system clipboard when using mouse selection
set -g @yank_selection_mouse 'clipboard'   # or 'primary' / 'secondary'

# Initialize tpm (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
